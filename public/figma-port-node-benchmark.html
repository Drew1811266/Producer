<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Producer Port Grid Node Benchmark</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
      :root {
        color-scheme: light;
        --canvas: #f5f6f8;
        --card: #ffffff;
        --panel: #f3f6f9;
        --stroke: #a9b7c9;
        --title: #9aa7bb;
        --cell: #e4ebf3;
        --cell-stroke: #bcc9d9;
        --cell-active: #5eb773;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--canvas);
        font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      .benchmark-stage {
        width: 900px;
        height: 940px;
        display: grid;
        place-items: center;
      }

      .node-benchmark {
        position: relative;
        width: 700px;
        height: 695px;
      }

      .port {
        position: absolute;
        left: 50%;
        width: 96px;
        height: 34px;
        border: 4px solid var(--stroke);
        border-radius: 999px;
        background: var(--card);
        transform: translateX(-50%);
      }

      .port-input {
        top: 6px;
      }

      .port-output {
        bottom: 0;
      }

      .card {
        position: absolute;
        left: 0;
        right: 0;
        top: 88px;
        bottom: 80px;
        overflow: hidden;
        border: 4px solid var(--stroke);
        border-radius: 42px;
        background: var(--card);
      }

      .title {
        position: absolute;
        top: 38px;
        left: 36px;
        margin: 0;
        color: var(--title);
        font-size: 36px;
        font-weight: 500;
        line-height: 1.08;
        letter-spacing: -0.03em;
      }

      .accessory-stack {
        position: absolute;
        right: 38px;
        bottom: 208px;
        display: flex;
        gap: 18px;
      }

      .accessory {
        width: 112px;
        height: 112px;
        border: 4px solid rgba(169, 183, 201, 0.7);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.84);
      }

      .divider {
        position: absolute;
        left: 0;
        right: 0;
        top: 366px;
        height: 4px;
        background: rgba(169, 183, 201, 0.58);
      }

      .grid-panel {
        position: absolute;
        left: 0;
        right: 0;
        top: 370px;
        bottom: 0;
        background: var(--panel);
      }

      .grid {
        position: absolute;
        left: 34px;
        right: 34px;
        top: 404px;
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        column-gap: 20px;
        row-gap: 18px;
      }

      .grid-cell {
        width: 46px;
        height: 46px;
        border: 4px solid var(--cell-stroke);
        border-radius: 12px;
        background: var(--cell);
      }

      .grid-cell[data-filled="true"] {
        border-color: color-mix(in srgb, var(--cell-active) 70%, var(--stroke));
        background: var(--cell-active);
      }
    </style>
  </head>
  <body>
    <main class="benchmark-stage">
      <section class="node-benchmark" aria-label="Second and third layer benchmark node">
        <span class="port port-input" aria-hidden="true"></span>
        <article class="card">
          <h1 class="title">节点名称</h1>
          <div class="accessory-stack" aria-hidden="true">
            <span class="accessory"></span>
            <span class="accessory"></span>
          </div>
          <span class="grid-panel" aria-hidden="true"></span>
          <span class="divider" aria-hidden="true"></span>
          <div class="grid" aria-hidden="true">
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
            <span class="grid-cell"></span>
          </div>
        </article>
        <span class="port port-output" aria-hidden="true"></span>
      </section>
    </main>
  </body>
</html>
